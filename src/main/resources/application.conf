ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ com.cinestream.ApplicationKt.module ]
    }
}

jwt {
    secret   = "CHANGE_ME_IN_PRODUCTION_USE_ENV_VAR"
    secret   = ${?JWT_SECRET}
    issuer   = "cinestream"
    audience = "cinestream-users"
}

tmdb {
    readAccessToken = ${?TMDB_READ_ACCESS_TOKEN}
    apiKey          = ${?TMDB_API_KEY}
}

stream {
    # Optional licensed playback provider URL templates.
    # Example: "https://provider.example/embed/movie/{tmdbId}"
    licensedMovieTemplate = ${?STREAM_MOVIE_TEMPLATE}
    licensedTvTemplate    = ${?STREAM_TV_TEMPLATE}
}

db {
    # SQLite for local dev (no setup needed)
    # Switch to Postgres for production:
    # url    = "jdbc:postgresql://localhost:5432/cinestream"
    # driver = "org.postgresql.Driver"
    url    = "jdbc:sqlite:./cinestream.db"
    driver = "org.sqlite.JDBC"
    url    = ${?DB_URL}
    driver = ${?DB_DRIVER}
}
