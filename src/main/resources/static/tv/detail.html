<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV — Details</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
</head>
<body>
    <div class="tv-shell">
        <nav class="tv-navbar" id="tv-navbar">
            <a href="index.html" class="navbar-logo" data-nav="logo">CineStream</a>
            <div class="navbar-links">
                <a href="index.html" class="tv-nav-item" data-nav="home">Home</a>
                <a href="browse.html" class="tv-nav-item" data-nav="browse">Browse</a>
                <a href="watchlist.html" class="tv-nav-item" data-nav="watchlist">Watchlist</a>
                <a href="search.html" class="tv-nav-item" data-nav="search">Search</a>
                <a href="login.html" class="tv-nav-item" data-nav="login">Sign In</a>
            </div>
        </nav>

        <div class="tv-stage" id="detail-scroller" style="overflow-y: hidden;">
            <div id="hero" class="tv-hero">
                <div class="hero-backdrop-overlay"></div>
                <div class="hero-content">
                    <div class="hero-badge" id="type-badge">Movie</div>
                    <h1 class="hero-title" id="title">Loading...</h1>
                    <div class="hero-meta" id="meta"></div>
                    <p class="hero-overview" id="overview"></p>
                    <div class="hero-actions" id="main-actions">
                        <a id="play-btn" class="btn btn-primary">▶ Play</a>
                        <button id="watchlist-btn" class="btn btn-secondary">Add to Watchlist</button>
                    </div>
                </div>
            </div>

            <div class="tv-rails-container" style="top: 450px;">
                <div class="tv-rails-scroller" id="detail-rails">
                    <!-- Stats Section -->
                    <section class="tv-section" id="stats-section" style="height: 120px;">
                        <div id="stats-row" style="display:flex; gap:40px;"></div>
                    </section>

                    <!-- Episodes -->
                    <section class="tv-section" id="episodes-section" style="display:none; height: 350px;">
                        <h2 class="section-title">Episodes</h2>
                        <div class="slider-wrap"><div class="tv-slider" id="ep-grid"></div></div>
                    </section>

                    <!-- Similar -->
                    <section class="tv-section" id="similar-section" style="display:none; height: 350px;">
                        <h2 class="section-title">More Like This</h2>
                        <div class="slider-wrap"><div class="tv-slider" id="similar-grid"></div></div>
                    </section>
                </div>
            </div>
        </div>
    </div>

    <script>
        var params = new URLSearchParams(window.location.search);
        var id = params.get('id'), type = params.get('type') || 'movie';
        var zone = 'hero', navIdx = 0, heroIdx = 0, railIdx = 0, cardIdx = 0;
        var sections = ['stats', 'episodes', 'similar'];
        var activeSections = ['stats'];
        var episodesData = [], similarData = [];

        function load() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tmdb/' + type + '/' + id, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    render(data);
                }
            };
            xhr.send();
        }

        function render(data) {
            document.getElementById('title').innerHTML = data.title || data.name;
            document.getElementById('overview').innerHTML = (data.overview || "").substring(0, 250) + "...";
            document.getElementById('hero').style.backgroundImage = "url('https://image.tmdb.org/t/p/w1280" + data.backdrop_path + "')";
            document.getElementById('type-badge').innerHTML = type.toUpperCase();

            var year = (data.release_date || data.first_air_date || '').substring(0, 4);
            var rate = data.vote_average ? '★ ' + data.vote_average.toFixed(1) : '';
            document.getElementById('meta').innerHTML = '<span>' + rate + '</span><span>' + year + '</span>';

            var stats = '<div class="stat-item-tv"><span class="stat-label-tv">Status</span><span class="stat-value-tv">' + (data.status || 'N/A') + '</span></div>';
            if (data.runtime) stats += '<div class="stat-item-tv"><span class="stat-label-tv">Runtime</span><span class="stat-value-tv">' + data.runtime + 'm</span></div>';
            document.getElementById('stats-row').innerHTML = stats;

            document.getElementById('play-btn').href = 'player.html?id=' + id + '&type=' + type;

            if (type === 'tv') loadEpisodes();
            loadSimilar();
            updateFocus();
        }

        function loadEpisodes() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tmdb/tv/' + id + '/season/1', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    episodesData = JSON.parse(xhr.responseText).episodes || [];
                    if (episodesData.length) {
                        document.getElementById('episodes-section').style.display = 'block';
                        activeSections.push('episodes');
                        var html = '';
                        for (var i = 0; i < episodesData.length; i++) {
                            html += '<div class="tv-card" id="card-episodes-' + i + '">' +
                                    '<img class="card-poster" src="https://image.tmdb.org/t/p/w300' + episodesData[i].still_path + '">' +
                                    '<div class="card-overlay"><div class="card-overlay-title">Ep ' + episodesData[i].episode_number + '</div></div>' +
                                    '</div>';
                        }
                        document.getElementById('ep-grid').innerHTML = html;
                    }
                }
            };
            xhr.send();
        }

        function loadSimilar() {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tmdb/' + type + '/' + id + '/similar', true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    similarData = JSON.parse(xhr.responseText).results || [];
                    if (similarData.length) {
                        document.getElementById('similar-section').style.display = 'block';
                        activeSections.push('similar');
                        var html = '';
                        for (var i = 0; i < similarData.length; i++) {
                            html += '<div class="tv-card" id="card-similar-' + i + '">' +
                                    '<img class="card-poster" src="https://image.tmdb.org/t/p/w342' + similarData[i].poster_path + '">' +
                                    '</div>';
                        }
                        document.getElementById('similar-grid').innerHTML = html;
                    }
                }
            };
            xhr.send();
        }

        function updateFocus() {
            var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
            for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

            if (zone === 'nav') {
                var items = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                if (items[navIdx]) items[navIdx].classList.add('tv-nav-focused');
            } else if (zone === 'hero') {
                var btns = document.querySelectorAll('#main-actions .btn');
                if (btns[heroIdx]) btns[heroIdx].classList.add('tv-focused');
                document.getElementById('detail-rails').style.transform = 'translateY(0)';
            } else if (zone === 'rail') {
                var key = activeSections[railIdx];
                if (key === 'stats') {
                    // Stats section has no cards, just visual
                    zone = 'hero'; updateFocus(); return;
                }
                var card = document.getElementById('card-' + key + '-' + cardIdx);
                if (card) {
                    card.classList.add('tv-focused');
                    document.getElementById(key === 'episodes' ? 'ep-grid' : 'similar-grid').style.transform = 'translateX(-' + (cardIdx * 220) + 'px)';
                    document.getElementById('detail-rails').style.transform = 'translateY(-' + (railIdx * 320) + 'px)';
                }
            }
        }

        document.onkeydown = function(e) {
            var k = e.keyCode || e.which;
            if (k === 37) { // Left
                if (zone === 'nav' && navIdx > 0) navIdx--;
                else if (zone === 'hero' && heroIdx > 0) heroIdx--;
                else if (zone === 'rail' && cardIdx > 0) cardIdx--;
            } else if (k === 39) { // Right
                if (zone === 'nav' && navIdx < 5) navIdx++;
                else if (zone === 'hero' && heroIdx < 1) heroIdx++;
                else if (zone === 'rail') {
                    var max = (activeSections[railIdx] === 'episodes' ? episodesData.length : similarData.length) - 1;
                    if (cardIdx < max) cardIdx++;
                }
            } else if (k === 38) { // Up
                if (zone === 'hero') zone = 'nav';
                else if (zone === 'rail') {
                    if (railIdx > 1) railIdx--; // Jump over stats which is index 0
                    else zone = 'hero';
                }
            } else if (k === 40) { // Down
                if (zone === 'nav') zone = 'hero';
                else if (zone === 'hero') {
                    if (activeSections.length > 1) { zone = 'rail'; railIdx = 1; cardIdx = 0; }
                } else if (zone === 'rail' && railIdx < activeSections.length - 1) {
                    railIdx++; cardIdx = 0;
                }
            } else if (k === 13) { // Enter
                if (zone === 'nav') {
                    window.location.href = document.querySelectorAll('.tv-nav-item, .navbar-logo')[navIdx].getAttribute('href');
                } else if (zone === 'hero') {
                    if (heroIdx === 0) window.location.href = document.getElementById('play-btn').href;
                } else if (zone === 'rail') {
                    var key = activeSections[railIdx];
                    if (key === 'episodes') window.location.href = 'player.html?id=' + id + '&type=tv&season=1&episode=' + episodesData[cardIdx].episode_number;
                    else if (key === 'similar') window.location.href = 'detail.html?id=' + similarData[cardIdx].id + '&type=' + (similarData[cardIdx].media_type || type);
                }
            } else if (k === 461 || k === 8) { window.location.href = 'index.html'; }
            updateFocus();
        };

        load();
    </script>
</body>
</html>
