<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV — Search</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
    <style>
        .search-area { padding: 100px 60px 40px; }
        .search-box-wrap { margin-bottom: 30px; }
        .tv-input {
            width: 100%; padding: 20px; font-size: 28px; background: #222; border: 4px solid transparent;
            border-radius: 8px; color: #fff; outline: none;
        }
        .tv-input.tv-focused { border-color: #E50914; background: #333; }
        .results-grid { display: flex; flex-wrap: wrap; gap: 20px; }
    </style>
</head>
<body>
    <div class="tv-shell">
        <nav class="tv-navbar" id="tv-navbar">
            <a href="index.html" class="navbar-logo" data-nav="logo">CineStream</a>
            <div class="navbar-links">
                <a href="index.html" class="tv-nav-item" data-nav="home">Home</a>
                <a href="browse.html" class="tv-nav-item" data-nav="browse">Browse</a>
                <a href="watchlist.html" class="tv-nav-item" data-nav="watchlist">Watchlist</a>
                <a href="search.html" class="tv-nav-item active" data-nav="search">Search</a>
                <a href="login.html" class="tv-nav-item" data-nav="login">Sign In</a>
            </div>
        </nav>

        <div class="tv-stage">
            <div class="search-area">
                <div class="search-box-wrap">
                    <input type="text" id="search-input" class="tv-input" placeholder="Type title to search..." autofocus>
                </div>
                <div class="results-grid" id="results"></div>
            </div>
        </div>
    </div>

    <script>
        var zone = 'input', navIdx = 0, cardIdx = 0;
        var resultsData = [];
        var timer = null;

        function updateFocus() {
            var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
            for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

            if (zone === 'nav') {
                var items = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                if (items[navIdx]) items[navIdx].classList.add('tv-nav-focused');
            } else if (zone === 'input') {
                document.getElementById('search-input').classList.add('tv-focused');
                document.getElementById('search-input').focus();
            } else if (zone === 'results') {
                var card = document.getElementById('card-search-' + cardIdx);
                if (card) card.classList.add('tv-focused');
            }
        }

        document.onkeydown = function(e) {
            var k = e.keyCode || e.which;
            if (k === 37) { // Left
                if (zone === 'nav' && navIdx > 0) navIdx--;
                else if (zone === 'results' && cardIdx > 0) cardIdx--;
            } else if (k === 39) { // Right
                if (zone === 'nav' && navIdx < 5) navIdx++;
                else if (zone === 'results' && cardIdx < resultsData.length - 1) cardIdx++;
            } else if (k === 38) { // Up
                if (zone === 'input') zone = 'nav';
                else if (zone === 'results') zone = 'input';
            } else if (k === 40) { // Down
                if (zone === 'nav') zone = 'input';
                else if (zone === 'input' && resultsData.length > 0) { zone = 'results'; cardIdx = 0; }
            } else if (k === 13) { // Enter
                if (zone === 'nav') {
                    window.location.href = document.querySelectorAll('.tv-nav-item, .navbar-logo')[navIdx].getAttribute('href');
                } else if (zone === 'results') {
                    var item = resultsData[cardIdx];
                    window.location.href = 'detail.html?id=' + item.id + '&type=' + (item.media_type || 'movie');
                }
            } else if (k === 461 || k === 8) { window.location.href = 'index.html'; }
            updateFocus();
        };

        document.getElementById('search-input').oninput = function() {
            var q = this.value;
            clearTimeout(timer);
            timer = setTimeout(function() {
                if (q.length > 2) search(q);
            }, 1000);
        };

        function search(q) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tmdb/search?query=' + encodeURIComponent(q), true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    resultsData = JSON.parse(xhr.responseText).results || [];
                    renderResults();
                }
            };
            xhr.send();
        }

        function renderResults() {
            var html = '';
            for (var i = 0; i < resultsData.length; i++) {
                var item = resultsData[i];
                var img = item.poster_path ? 'https://image.tmdb.org/t/p/w185' + item.poster_path : '';
                html += '<div class="tv-card" id="card-search-' + i + '" style="width:180px;">' +
                        '<img class="card-poster" src="' + img + '">' +
                        '<div class="card-overlay"><div class="card-overlay-title">' + (item.title || item.name) + '</div></div>' +
                        '</div>';
            }
            document.getElementById('results').innerHTML = html;
            updateFocus();
        }

        updateFocus();
    </script>
</body>
</html>
