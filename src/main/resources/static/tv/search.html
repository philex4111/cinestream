<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV — Search</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
    <style>
        .search-stage { padding: 100px 60px 40px; }
        .search-input-wrap { margin-bottom: 25px; }
        .tv-search-box {
            width: 100%; padding: 15px 25px; background: var(--bg-elevated);
            border: 4px solid transparent; border-radius: var(--radius-md);
            color: #fff; font-size: 24px; outline: none; box-sizing: border-box;
        }
        .tv-search-box.tv-focused { border-color: var(--crimson); background: #222; }

        .results-info-tv { font-size: 16px; color: var(--grey-3); font-weight: 700; margin-bottom: 20px; }

        /* The Grid Architecture from Browse */
        .grid-viewport { width: 100%; height: 380px; overflow: hidden; position: relative; }
        .grid-scroller { display: block; transition: transform 0.4s ease-out; }
        .tv-grid-row { display: flex; gap: 20px; margin-bottom: 20px; }

        .tv-card-grid {
            width: 212px; height: 318px; flex-shrink: 0; position: relative;
            border: 5px solid transparent; border-radius: 8px; overflow: hidden;
            background: var(--bg-elevated); transition: transform 0.2s;
        }
        .tv-card-grid img { width: 100%; height: 100%; object-fit: cover; }
        .tv-card-grid.tv-focused { border-color: #fff; transform: scale(1.05); z-index: 10; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .card-info-tv {
            position: absolute; bottom: 0; left: 0; right: 0; padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
        }
        .card-title-tv { font-size: 14px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* Pagination mirroring Browse */
        .pagination-tv { display: flex; justify-content: center; gap: 30px; margin-top: 20px; align-items: center; }
        .page-info { font-size: 18px; font-weight: 700; color: #fff; }
    </style>
</head>
<body>
    <div class="tv-shell">
        <nav class="tv-navbar" id="tv-navbar">
            <a href="index.html" class="navbar-logo">CineStream</a>
            <div class="navbar-links">
                <a href="index.html" class="tv-nav-item">Home</a>
                <a href="browse.html" class="tv-nav-item">Browse</a>
                <a href="watchlist.html" class="tv-nav-item">Watchlist</a>
                <a href="search.html" class="tv-nav-item active">Search</a>
                <a href="login.html" class="tv-nav-item">Sign In</a>
            </div>
        </nav>

        <div class="search-stage">
            <div class="search-input-wrap">
                <input type="text" class="tv-search-box tv-focusable" id="search-input" placeholder="Type title to search..." aria-label="Search" autofocus>
            </div>

            <div class="results-info-tv" id="results-info">Ready to search</div>

            <div class="grid-viewport" id="results-viewport">
                <div class="grid-scroller" id="grid-scroller">
                    <!-- Results injected here -->
                </div>
            </div>

            <div class="pagination-tv" id="pagination-bar" style="display:none;">
                <div class="btn btn-secondary tv-focusable" id="prev-page">Previous</div>
                <div class="page-info" id="page-display">Page 1</div>
                <div class="btn btn-secondary tv-focusable" id="next-page">Next Page</div>
            </div>
        </div>

        <div class="tv-status" id="tv-status">Searching...</div>
    </div>

    <script>
        var state = { q: '', page: 1, totalPages: 1, results: [] };
        var nav = { zone: 'input', navIdx: 3, gridIdx: 0, pageIdx: 0, cols: 5 };
        var timer = null;

        function init() {
            bindKeys();
            document.getElementById('search-input').oninput = function() {
                var self = this;
                clearTimeout(timer);
                timer = setTimeout(function() {
                    if (self.value.length > 2) {
                        state.q = self.value;
                        state.page = 1;
                        performSearch();
                    }
                }, 1000);
            };
            updateFocus();
        }

        function bindKeys() {
            document.onkeydown = function(e) {
                var k = e.keyCode || e.which;
                if (k === 37) move('left');
                else if (k === 39) move('right');
                else if (k === 38) move('up');
                else if (k === 40) move('down');
                else if (k === 13) enter();
                else if (k === 461 || k === 8) {
                    if (nav.zone === 'input' && document.getElementById('search-input').value.length > 0) return;
                    e.preventDefault(); window.location.href = 'index.html';
                }
            };
        }

        function performSearch() {
            status('Searching...');
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api/tmdb/search?query=' + encodeURIComponent(state.q) + '&page=' + state.page, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    var data = JSON.parse(xhr.responseText);
                    state.results = data.results || [];
                    state.totalPages = Math.min(data.total_pages || 1, 500);
                    renderGrid();
                    status('');
                }
            };
            xhr.send();
        }

        function renderGrid() {
            var scroller = document.getElementById('grid-scroller');
            var html = '';
            var rowHtml = '';

            if (state.results.length === 0) {
                scroller.innerHTML = '<div style="padding:40px; text-align:center; color:var(--grey-2);">No results found.</div>';
                document.getElementById('pagination-bar').style.display = 'none';
                document.getElementById('results-info').innerHTML = 'No titles found for "' + state.q + '"';
                return;
            }

            for (var i = 0; i < state.results.length; i++) {
                var item = state.results[i];
                var img = item.poster_path ? 'https://image.tmdb.org/t/p/w342' + item.poster_path : '';

                rowHtml += '<div class="tv-card-grid" id="card-' + i + '">' +
                           '<img src="' + img + '">' +
                           '<div class="card-info-tv"><div class="card-title-tv">' + (item.title || item.name) + '</div></div>' +
                           '</div>';

                if ((i + 1) % nav.cols === 0 || i === state.results.length - 1) {
                    html += '<div class="tv-grid-row">' + rowHtml + '</div>';
                    rowHtml = '';
                }
            }
            scroller.innerHTML = html;
            document.getElementById('pagination-bar').style.display = 'flex';
            document.getElementById('page-display').innerHTML = 'Page ' + state.page + ' of ' + state.totalPages;
            document.getElementById('results-info').innerHTML = 'Found ' + state.results.length + ' results';
            updateFocus();
        }

        function move(dir) {
            if (nav.zone === 'nav') {
                if (dir === 'right' && nav.navIdx < 4) nav.navIdx++;
                else if (dir === 'left' && nav.navIdx > 0) nav.navIdx--;
                else if (dir === 'down') nav.zone = 'input';
            }
            else if (nav.zone === 'input') {
                if (dir === 'up') nav.zone = 'nav';
                else if (dir === 'down' && state.results.length > 0) { nav.zone = 'grid'; nav.gridIdx = 0; }
            }
            else if (nav.zone === 'grid') {
                if (dir === 'up') {
                    if (nav.gridIdx >= nav.cols) nav.gridIdx -= nav.cols;
                    else nav.zone = 'input';
                } else if (dir === 'down') {
                    if (nav.gridIdx + nav.cols < state.results.length) nav.gridIdx += nav.cols;
                    else { nav.zone = 'page'; nav.pageIdx = 0; }
                } else if (dir === 'right' && nav.gridIdx < state.results.length - 1) {
                    nav.gridIdx++;
                } else if (dir === 'left') {
                    if (nav.gridIdx % nav.cols > 0) nav.gridIdx--;
                    else { nav.zone = 'nav'; nav.navIdx = 0; }
                }
            }
            else if (nav.zone === 'page') {
                if (dir === 'up') { nav.zone = 'grid'; nav.gridIdx = state.results.length - 1; }
                else if (dir === 'right' && nav.pageIdx < 1) nav.pageIdx = 1;
                else if (dir === 'left' && nav.pageIdx > 0) nav.pageIdx = 0;
            }
            updateFocus();
        }

        function updateFocus() {
            var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
            for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

            if (nav.zone === 'nav') {
                var items = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                if (items[nav.navIdx]) items[nav.navIdx].classList.add('tv-nav-focused');
            } else if (nav.zone === 'input') {
                var input = document.getElementById('search-input');
                input.classList.add('tv-focused');
                input.focus();
            } else if (nav.zone === 'grid') {
                var card = document.getElementById('card-' + nav.gridIdx);
                if (card) {
                    card.classList.add('tv-focused');
                    var row = Math.floor(nav.gridIdx / nav.cols);
                    document.getElementById('grid-scroller').style.transform = 'translateY(-' + (row * 338) + 'px)';
                }
            } else if (nav.zone === 'page') {
                var items = [document.getElementById('prev-page'), document.getElementById('next-page')];
                if (items[nav.pageIdx]) items[nav.pageIdx].classList.add('tv-focused');
            }
        }

        function enter() {
            if (nav.zone === 'nav') window.location.href = document.querySelectorAll('.tv-nav-item, .navbar-logo')[nav.navIdx].getAttribute('href');
            else if (nav.zone === 'grid') {
                var item = state.results[nav.gridIdx];
                if (item) window.location.href = 'detail.html?id=' + item.id + '&type=' + (item.media_type || 'movie');
            } else if (nav.zone === 'page') {
                if (nav.pageIdx === 0 && state.page > 1) { state.page--; performSearch(); }
                else if (nav.pageIdx === 1 && state.page < state.totalPages) { state.page++; performSearch(); }
            }
        }

        function status(m) {
            var el = document.getElementById('tv-status');
            el.innerHTML = m;
            el.className = m ? 'tv-status' : 'tv-status hidden';
        }

        init();
    </script>
</body>
</html>
