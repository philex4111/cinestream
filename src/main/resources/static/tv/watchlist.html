<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV — Watchlist</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
    <style>
        .watchlist-container { padding: 100px 60px 40px; }
        .empty-state { padding: 150px 0; text-align: center; color: var(--grey-3); font-size: 24px; }
    </style>
</head>
<body>
    <div class="tv-shell">
        <nav class="tv-navbar" id="tv-navbar">
            <a href="index.html" class="navbar-logo" data-nav="logo">CineStream</a>
            <div class="navbar-links">
                <a href="index.html" class="tv-nav-item" data-nav="home">Home</a>
                <a href="browse.html" class="tv-nav-item" data-nav="browse">Browse</a>
                <a href="watchlist.html" class="tv-nav-item active" data-nav="watchlist">Watchlist</a>
                <a href="search.html" class="tv-nav-item" data-nav="search">Search</a>
                <a href="login.html" class="tv-nav-item" data-nav="login">Sign In</a>
            </div>
        </nav>

        <div class="watchlist-container">
            <h1 class="section-title">My Watchlist</h1>
            <div id="slider-watchlist-wrap" style="width: 100%; overflow: hidden;">
                <div class="tv-slider" id="slider-watchlist" style="display: flex; gap: 20px;">
                    <!-- Watchlist items -->
                </div>
            </div>
        </div>

        <div class="tv-status" id="tv-status">Loading Watchlist...</div>
    </div>

    <script>
        var zone = 'rail', navIdx = 2, cardIdx = 0;
        var watchlistData = [];
        var api = '/api';

        function init() {
            bindKeys();
            loadWatchlist();
        }

        function bindKeys() {
            document.onkeydown = function(e) {
                var k = e.keyCode || e.which;
                if (k === 37) move('left');
                else if (k === 39) move('right');
                else if (k === 38) move('up');
                else if (k === 40) move('down');
                else if (k === 13) enter();
                else if (k === 461 || k === 8) { window.location.href = 'index.html'; }
            };
        }

        function loadWatchlist() {
            var xhr = new XMLHttpRequest();
            var token = localStorage.getItem('token');
            if (!token) { window.location.href = 'login.html'; return; }

            xhr.open('GET', api + '/watchlist', true);
            xhr.setRequestHeader('Authorization', 'Bearer ' + token);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4) {
                    if (xhr.status === 200) {
                        watchlistData = JSON.parse(xhr.responseText);
                        renderWatchlist();
                    } else if (xhr.status === 401) {
                        window.location.href = 'login.html';
                    }
                    document.getElementById('tv-status').className += ' hidden';
                }
            };
            xhr.send();
        }

        function renderWatchlist() {
            var slider = document.getElementById('slider-watchlist');
            if (!watchlistData.length) {
                slider.innerHTML = '<div class="empty-state">Your watchlist is empty. Add titles to see them here!</div>';
                return;
            }

            var html = '';
            for (var i = 0; i < watchlistData.length; i++) {
                var item = watchlistData[i];
                // Since watchlist only returns IDs, we'll fetch details or show a rich card
                html += '<div class="tv-card" id="card-watchlist-' + i + '">' +
                        '<div class="card-poster" style="display:flex; flex-direction:column; align-items:center; justify-content:center; background:var(--bg-elevated); height:300px; color:#fff; border-radius:8px;">' +
                        '<div style="font-size:32px; margin-bottom:10px;">★</div>' +
                        '<div style="font-size:14px; font-weight:700;">ID: ' + item.tmdbId + '</div>' +
                        '<div style="font-size:12px; color:var(--grey-2); text-transform:uppercase; margin-top:5px;">' + item.mediaType + '</div>' +
                        '</div>' +
                        '</div>';
            }
            slider.innerHTML = html;
            updateFocus();
        }

        function move(dir) {
            if (zone === 'nav') {
                if (dir === 'right' && navIdx < 4) navIdx++;
                else if (dir === 'left' && navIdx > 0) navIdx--;
                else if (dir === 'down' && watchlistData.length > 0) zone = 'rail';
            } else {
                if (dir === 'up') zone = 'nav';
                else if (dir === 'right' && cardIdx < watchlistData.length - 1) cardIdx++;
                else if (dir === 'left' && cardIdx > 0) cardIdx--;
            }
            updateFocus();
        }

        function updateFocus() {
            var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
            for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

            if (zone === 'nav') {
                var navItems = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                if (navItems[navIdx]) navItems[navIdx].classList.add('tv-nav-focused');
            } else {
                var card = document.getElementById('card-watchlist-' + cardIdx);
                if (card) {
                    card.classList.add('tv-focused');
                    document.getElementById('slider-watchlist').style.transform = 'translateX(-' + (cardIdx * 220) + 'px)';
                }
            }
        }

        function enter() {
            if (zone === 'nav') {
                var links = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                window.location.href = links[navIdx].getAttribute('href');
            } else if (watchlistData[cardIdx]) {
                var item = watchlistData[cardIdx];
                window.location.href = 'detail.html?id=' + item.tmdbId + '&type=' + item.mediaType;
            }
        }

        init();
    </script>
</body>
</html>
