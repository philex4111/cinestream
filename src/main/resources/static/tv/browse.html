<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV — Browse</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
</head>
<body>
    <div class="tv-shell">
        <nav class="tv-navbar" id="tv-navbar">
            <a href="index.html" class="navbar-logo" data-nav="logo">CineStream</a>
            <div class="navbar-links">
                <a href="index.html" class="tv-nav-item" data-nav="home">Home</a>
                <a href="browse.html" class="tv-nav-item active" data-nav="browse">Browse</a>
                <a href="watchlist.html" class="tv-nav-item" data-nav="watchlist">Watchlist</a>
                <a href="search.html" class="tv-nav-item" data-nav="search">Search</a>
                <a href="login.html" class="tv-nav-item" data-nav="login">Sign In</a>
            </div>
        </nav>

        <div class="tv-stage">
            <div style="padding: 100px 60px 20px;">
                <div id="filter-wrap" style="display:flex; gap:20px; margin-bottom: 30px;">
                    <div class="btn btn-secondary filter-tab active" data-type="movie">Movies</div>
                    <div class="btn btn-secondary filter-tab" data-type="tv">TV Series</div>
                </div>
                <div class="tv-rails-container" style="top: 250px; padding-top: 0;">
                    <div class="tv-rails-scroller" id="browse-rails">
                        <section class="tv-section">
                            <div class="slider-wrap"><div class="tv-slider" id="browse-grid"></div></div>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        var zone = 'nav', navIdx = 0, filterIdx = 0, cardIdx = 0;
        var currentType = 'movie', browseData = [];

        function updateFocus() {
            var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
            for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

            if (zone === 'nav') {
                var items = document.querySelectorAll('.tv-nav-item, .navbar-logo');
                if (items[navIdx]) items[navIdx].classList.add('tv-nav-focused');
            } else if (zone === 'filter') {
                var tabs = document.querySelectorAll('.filter-tab');
                if (tabs[filterIdx]) tabs[filterIdx].classList.add('tv-focused');
            } else if (zone === 'rail') {
                var card = document.getElementById('card-browse-' + cardIdx);
                if (card) {
                    card.classList.add('tv-focused');
                    document.getElementById('browse-grid').style.transform = 'translateX(-' + (cardIdx * 220) + 'px)';
                }
            }
        }

        document.onkeydown = function(e) {
            var k = e.keyCode || e.which;
            if (k === 37) { // Left
                if (zone === 'nav' && navIdx > 0) navIdx--;
                else if (zone === 'filter' && filterIdx > 0) filterIdx--;
                else if (zone === 'rail' && cardIdx > 0) cardIdx--;
            } else if (k === 39) { // Right
                if (zone === 'nav' && navIdx < 5) navIdx++;
                else if (zone === 'filter' && filterIdx < 1) filterIdx++;
                else if (zone === 'rail' && cardIdx < browseData.length - 1) cardIdx++;
            } else if (k === 38) { // Up
                if (zone === 'filter') zone = 'nav';
                else if (zone === 'rail') zone = 'filter';
            } else if (k === 40) { // Down
                if (zone === 'nav') zone = 'filter';
                else if (zone === 'filter') zone = 'rail';
            } else if (k === 13) { // Enter
                if (zone === 'nav') {
                    window.location.href = document.querySelectorAll('.tv-nav-item, .navbar-logo')[navIdx].getAttribute('href');
                } else if (zone === 'filter') {
                    var type = document.querySelectorAll('.filter-tab')[filterIdx].getAttribute('data-type');
                    if (type !== currentType) {
                        currentType = type;
                        var tabs = document.querySelectorAll('.filter-tab');
                        for(var i=0; i<tabs.length; i++) tabs[i].classList.remove('active');
                        tabs[filterIdx].classList.add('active');
                        load();
                    }
                } else if (zone === 'rail') {
                    window.location.href = 'detail.html?id=' + browseData[cardIdx].id + '&type=' + currentType;
                }
            } else if (k === 461 || k === 8) { window.location.href = 'index.html'; }
            updateFocus();
        };

        function load() {
            var xhr = new XMLHttpRequest();
            var path = currentType === 'movie' ? '/tmdb/movie/popular' : '/tmdb/tv/popular';
            xhr.open('GET', '/api' + path, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState === 4 && xhr.status === 200) {
                    browseData = JSON.parse(xhr.responseText).results || [];
                    render();
                }
            };
            xhr.send();
        }

        function render() {
            var html = '';
            for (var i = 0; i < browseData.length; i++) {
                var item = browseData[i];
                var img = item.poster_path ? 'https://image.tmdb.org/t/p/w342' + item.poster_path : '';
                html += '<div class="tv-card" id="card-browse-' + i + '">' +
                        '<img class="card-poster" src="' + img + '">' +
                        '<div class="card-overlay"><div class="card-overlay-title">' + (item.title || item.name) + '</div></div>' +
                        '</div>';
            }
            document.getElementById('browse-grid').innerHTML = html;
            cardIdx = 0;
            updateFocus();
        }

        load();
        updateFocus();
    </script>
</body>
</html>
