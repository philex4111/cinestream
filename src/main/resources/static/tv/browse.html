<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CineStream TV - Browse</title>
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="css/tv.css">
    <style>
        /* Override the fixed 1280x720 TV canvas for this page only, so it fits
           whatever the real browser window size is instead of leaving dead
           space or clipping the pagination bar off-screen. */
        html, body { width: 100%; height: 100%; overflow: hidden; }
        .tv-shell { width: 100%; height: 100vh; }

        .browse-stage {
            height: 100vh; box-sizing: border-box; padding: 88px 60px 18px;
            display: flex; flex-direction: column;
        }
        #filter-bar-tv { flex: 0 0 auto; }
        .grid-viewport {
            width: 100%; flex: 1 1 auto; min-height: 0; overflow: hidden; position: relative;
        }
        .grid-container-scroller { display: block; transition: transform 0.4s ease-out; }
        .grid-row { display: flex; gap: 18px; margin-bottom: 18px; }
        .pagination-tv { flex: 0 0 auto; }

        .tv-card-grid {
            width: 190px; height: 285px; flex-shrink: 0; position: relative;
            border: 5px solid transparent; border-radius: 8px; overflow: hidden;
            background: var(--bg-elevated); transition: transform 0.2s;
        }
        .tv-card-grid img { width: 100%; height: 100%; object-fit: cover; }
        .tv-card-grid.tv-focused { border-color: #fff; transform: scale(1.05); z-index: 10; box-shadow: 0 0 20px rgba(0,0,0,0.8); }
        .pagination-tv .btn { min-width:50px; padding:10px 18px; font-size:26px; line-height:20px; }
        .tv-page-numbers { display:flex; align-items:center; gap:8px; }
        .tv-page-chip { min-width:42px; height:42px; padding:0 10px; border:1px solid #383838; border-radius:7px; background:#121212; color:#bbb; font-size:17px; font-weight:700; }
        .tv-page-chip.active { background:var(--crimson); border-color:var(--crimson); color:#fff; }
        .tv-page-chip.ellipsis { border-color:transparent; background:transparent; min-width:20px; }    </style>
</head>
<body>
<div class="tv-shell">
    <nav class="tv-navbar" id="tv-navbar">
        <a href="index.html" class="navbar-logo">CineStream</a>
        <div class="navbar-links">
            <a href="index.html" class="tv-nav-item">Home</a>
            <a href="browse.html" class="tv-nav-item active">Browse</a>
            <a href="watchlist.html" class="tv-nav-item">Watchlist</a>
            <a href="search.html" class="tv-nav-item">Search</a>
            <a href="login.html" class="tv-nav-item">Sign In</a>
        </div>
    </nav>

    <div class="browse-stage">
        <div id="filter-bar-tv" style="display:flex; align-items:center; gap:20px; margin-bottom: 25px;">
            <div class="tab-tv active" data-type="all">All</div>
            <div class="tab-tv" data-type="movie">Movies</div>
            <div class="tab-tv" data-type="tv">Series</div>
            <div style="width:1px; height:30px; background:var(--grey-4); margin:0 10px;"></div>
            <div id="results-info" style="color:var(--grey-3); font-size:16px; font-weight:700;">Loading...</div>
        </div>

        <div class="grid-viewport">
            <div class="grid-container-scroller" id="grid-scroller">
                <!-- Virtual Rows -->
            </div>
        </div>

        <div class="pagination-tv" style="display:flex; justify-content:center; gap:30px; margin-top:14px; align-items:center;">
            <div class="btn btn-secondary" id="btn-prev" onclick="goToPage(state.page - 1)">&#8249;</div>
            <div id="page-info" class="tv-page-numbers">Page 1</div>
            <div class="btn btn-secondary" id="btn-next" onclick="goToPage(state.page + 1)">&#8250;</div>
        </div>
    </div>

    <div class="tv-status" id="tv-status">Fetching Titles...</div>
</div>

<script>
    var state = { type: 'all', page: 1, totalPages: 500, results: [] };
    var nav = { zone: 'grid', navIdx: 1, tabIdx: 0, gridIdx: 0, pageIdx: 0, cols: 5 };

    // Work out how many card columns actually fit the real viewport width,
    // instead of assuming a fixed 5 - this is what was leaving the extra
    // empty space and causing the grid to under/overfill the row.
    function computeCols() {
        var viewport = document.querySelector('.grid-viewport');
        var w = viewport ? viewport.clientWidth : 950;
        var cardStep = 190 + 18; // card width + row gap, matches CSS
        var cols = Math.floor((w + 18) / cardStep);
        return Math.max(1, cols);
    }

    function init() {
        nav.cols = computeCols();
        bindKeys();
        loadContent();
        window.onresize = function() {
            var newCols = computeCols();
            if (newCols !== nav.cols) {
                nav.cols = newCols;
                nav.gridIdx = 0;
                renderGrid();
            }
        };
    }

    function bindKeys() {
        document.onkeydown = function(e) {
            var k = e.keyCode || e.which;
            if (k === 37) move('left');
            else if (k === 39) move('right');
            else if (k === 38) move('up');
            else if (k === 40) move('down');
            else if (k === 13) enter();
            else if (k === 461 || k === 8) { e.preventDefault(); window.location.href = 'index.html'; }
        };
    }

    function loadContent() {
        status('Fetching Page ' + state.page + '...');
        var moviePath = '/tmdb/movie/popular?page=' + state.page;
        var tvPath = '/tmdb/tv/popular?page=' + state.page;

        function normalize(items) {
            return (items || []).filter(function(item) { return item && item.poster_path; }).map(function(item) {
                if (!item.media_type) item.media_type = item.first_air_date ? 'tv' : 'movie';
                return item;
            });
        }
        function apply(items, total) {
            state.results = normalize(items);
            state.totalPages = Math.min(total || 1, 500);
            nav.gridIdx = 0;
            document.getElementById('grid-scroller').style.transform = 'translateY(0)';
            renderGrid();
            status('');
        }
        function fail() { status('Error loading the catalog. Please try again.', true); }
        function request(path, done) {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', '/api' + path, true);
            xhr.onreadystatechange = function() {
                if (xhr.readyState !== 4) return;
                if (xhr.status >= 200 && xhr.status < 300) {
                    try { done(JSON.parse(xhr.responseText)); } catch (e) { fail(); }
                } else fail();
            };
            xhr.send();
        }

        if (state.type === 'all') {
            var movies, series, failed = false;
            function complete() {
                if (failed || !movies || !series) return;
                apply((movies.results || []).concat(series.results || []), Math.max(movies.total_pages || 1, series.total_pages || 1));
            }
            request(moviePath, function(data) { movies = data; complete(); });
            request(tvPath, function(data) { series = data; complete(); });
        } else {
            request(state.type === 'movie' ? moviePath : tvPath, function(data) {
                apply(data.results || [], data.total_pages || 1);
            });
        }
    }

    function goToPage(page) {
        if (page < 1 || page > state.totalPages || page === state.page) return;
        state.page = page;
        nav.gridIdx = 0;
        loadContent();
    }

    function renderPagination() {
        var pages = [], total = state.totalPages, current = state.page;
        if (total <= 7) { for (var i = 1; i <= total; i++) pages.push(i); }
        else {
            pages = [1];
            var start = Math.max(2, current - 1), end = Math.min(total - 1, current + 1);
            if (start > 2) pages.push('...');
            for (var j = start; j <= end; j++) pages.push(j);
            if (end < total - 1) pages.push('...');
            pages.push(total);
        }
        var html = '';
        for (var k = 0; k < pages.length; k++) {
            if (pages[k] === '...') html += '<span class="tv-page-chip ellipsis">...</span>';
            else html += '<button class="tv-page-chip' + (pages[k] === current ? ' active' : '') + '" onclick="goToPage(' + pages[k] + ')">' + pages[k] + '</button>';
        }
        document.getElementById('page-info').innerHTML = html;
    }
    function renderGrid() {
        var scroller = document.getElementById('grid-scroller');
        var html = '';
        var rowHtml = '';

        for (var i = 0; i < state.results.length; i++) {
            var item = state.results[i];
            var img = item.poster_path ? 'https://image.tmdb.org/t/p/w342' + item.poster_path : '';

            rowHtml += '<div class="tv-card-grid" id="card-' + i + '">' +
                       '<img src="' + img + '">' +
                       '<div class="card-info-tv" style="position:absolute; bottom:0; left:0; right:0; padding:10px; background:linear-gradient(transparent, rgba(0,0,0,0.9));">' +
                       '<div style="font-size:14px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">' + (item.title || item.name) + '</div>' +
                       '</div></div>';

            if ((i + 1) % nav.cols === 0 || i === state.results.length - 1) {
                html += '<div class="grid-row">' + rowHtml + '</div>';
                rowHtml = '';
            }
        }
        scroller.innerHTML = html;
        renderPagination();
        document.getElementById('results-info').innerHTML = state.results.length + ' titles - Page ' + state.page + ' of ' + state.totalPages;
        updateFocus();
    }

    function move(dir) {
        if (nav.zone === 'nav') {
            if (dir === 'right' && nav.navIdx < 5) nav.navIdx++;
            else if (dir === 'left' && nav.navIdx > 0) nav.navIdx--;
            else if (dir === 'down') nav.zone = 'tab';
        }
        else if (nav.zone === 'tab') {
            if (dir === 'up') nav.zone = 'nav';
            else if (dir === 'down') { nav.zone = 'grid'; nav.gridIdx = 0; }
            else if (dir === 'right' && nav.tabIdx < 2) nav.tabIdx++;
            else if (dir === 'left' && nav.tabIdx > 0) nav.tabIdx--;
        }
        else if (nav.zone === 'grid') {
            if (dir === 'up') {
                if (nav.gridIdx >= nav.cols) nav.gridIdx -= nav.cols;
                else nav.zone = 'tab';
            } else if (dir === 'down') {
                if (nav.gridIdx + nav.cols < state.results.length) nav.gridIdx += nav.cols;
                else { nav.zone = 'page'; nav.pageIdx = state.page > 1 ? 0 : 1; }
            } else if (dir === 'right' && nav.gridIdx < state.results.length - 1) {
                nav.gridIdx++;
            } else if (dir === 'left') {
                if (nav.gridIdx % nav.cols > 0) nav.gridIdx--;
                else { nav.zone = 'nav'; nav.navIdx = 0; }
            }
        }
        else if (nav.zone === 'page') {
            if (dir === 'up') { nav.zone = 'grid'; nav.gridIdx = state.results.length - 1; }
            else if (dir === 'right' && nav.pageIdx < 1) nav.pageIdx = 1;
            else if (dir === 'left' && nav.pageIdx > 0) nav.pageIdx = 0;
        }
        updateFocus();
    }

    function updateFocus() {
        var all = document.querySelectorAll('.tv-focused, .tv-nav-focused');
        for(var i=0; i<all.length; i++) { all[i].classList.remove('tv-focused'); all[i].classList.remove('tv-nav-focused'); }

        if (nav.zone === 'nav') {
            var items = document.querySelectorAll('.tv-nav-item, .navbar-logo');
            if (items[nav.navIdx]) items[nav.navIdx].classList.add('tv-nav-focused');
        }
        else if (nav.zone === 'tab') {
            var tabs = document.querySelectorAll('.tab-tv');
            if (tabs[nav.tabIdx]) tabs[nav.tabIdx].classList.add('tv-nav-focused');
        }
        else if (nav.zone === 'grid') {
            var card = document.getElementById('card-' + nav.gridIdx);
            if (card) {
                card.classList.add('tv-focused');
                var row = Math.floor(nav.gridIdx / nav.cols);
                var rowGap = 18; // matches .grid-row margin-bottom in CSS
                var rowHeight = card.offsetHeight + rowGap;
                document.getElementById('grid-scroller').style.transform = 'translateY(-' + (Math.max(0, row - 1) * rowHeight) + 'px)';
            }
        }
        else if (nav.zone === 'page') {
            var btns = [document.getElementById('btn-prev'), document.getElementById('btn-next')];
            if (btns[nav.pageIdx]) btns[nav.pageIdx].classList.add('tv-focused');
        }
    }

    function enter() {
        if (nav.zone === 'nav') window.location.href = document.querySelectorAll('.tv-nav-item, .navbar-logo')[nav.navIdx].getAttribute('href');
        else if (nav.zone === 'tab') {
            var tabs = document.querySelectorAll('.tab-tv');
            state.type = tabs[nav.tabIdx].getAttribute('data-type');
            for(var i=0; i<tabs.length; i++) tabs[i].className = 'tab-tv';
            tabs[nav.tabIdx].className = 'tab-tv active';
            state.page = 1;
            loadContent();
        }
        else if (nav.zone === 'grid') {
            var item = state.results[nav.gridIdx];
            if (item) window.location.href = 'detail.html?id=' + item.id + '&type=' + (item.media_type || (item.first_air_date ? 'tv' : 'movie'));
        }
        else if (nav.zone === 'page') {
            if (nav.pageIdx === 0 && state.page > 1) goToPage(state.page - 1);
            else if (nav.pageIdx === 1 && state.page < state.totalPages) goToPage(state.page + 1);
        }
    }

    function status(m, err) {
        var el = document.getElementById('tv-status');
        el.innerHTML = m;
        el.className = m ? 'tv-status' + (err ? ' error' : '') : 'tv-status hidden';
    }

    init();
</script>
</body>
</html>
