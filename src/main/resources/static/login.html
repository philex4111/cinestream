<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In — CineStream</title>
    <link rel="stylesheet" href="/css/main.css" />
    <style>
        .auth-page {
            background:
                    linear-gradient(rgba(10,10,10,0.92), rgba(10,10,10,0.97)),
                    radial-gradient(circle at 30% 20%, rgba(229,9,20,0.15), transparent 50%);
        }
        .auth-footer-link { text-align: center; font-size: 14px; color: var(--grey-2); margin-top: 24px; }
        .auth-footer-link a { color: var(--white); font-weight: 600; }
        .auth-footer-link a:hover { color: var(--crimson); }
        .password-row { display: flex; align-items: center; justify-content: space-between; }
        .password-toggle { font-size: 12px; color: var(--grey-2); cursor: pointer; }
        .password-toggle:hover { color: var(--white); }
        .form-submit-btn { width: 100%; justify-content: center; padding: 13px; font-size: 15px; }
        .form-submit-btn:disabled { opacity: 0.6; pointer-events: none; }
        .divider-row { display: flex; align-items: center; gap: 12px; margin: 24px 0; }
        .divider-row::before, .divider-row::after { content: ''; flex: 1; height: 1px; background: var(--grey-4); }
        .divider-row span { font-size: 12px; color: var(--grey-3); }
    </style>
</head>
<body>

<div class="auth-page">
    <div class="auth-card">
        <a href="/" class="auth-logo">
            <div class="logo-icon" style="width:32px;height:32px;background:var(--crimson);border-radius:6px;display:flex;align-items:center;justify-content:center;">
                <svg viewBox="0 0 24 24" fill="white" width="18" height="18"><path d="M8 5v14l11-7z"/></svg>
            </div>
            CineStream
        </a>

        <h1 class="auth-title">Welcome back</h1>
        <p class="auth-sub">Sign in to continue watching</p>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label class="form-label" for="email">Email</label>
                <input type="email" id="email" class="form-input" placeholder="you@example.com" autocomplete="email" required />
                <div class="form-error" id="email-error">Please enter a valid email address</div>
            </div>

            <div class="form-group">
                <div class="password-row">
                    <label class="form-label" for="password">Password</label>
                    <span class="password-toggle" id="toggle-password">Show</span>
                </div>
                <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required />
                <div class="form-error" id="password-error">Password is required</div>
            </div>

            <div class="form-error" id="form-error" style="margin-bottom:16px;"></div>

            <button type="submit" class="btn btn-crimson form-submit-btn" id="submit-btn">
                Sign In
            </button>
        </form>

        <div class="auth-footer-link">
            New to CineStream? <a href="/register.html">Create an account</a>
        </div>
    </div>
</div>

<script type="module">
    import { authApi } from '/js/api.js';
    import { auth } from '/js/auth.js';
    import { toast } from '/js/components.js';

    // Already logged in? bounce away
    auth.redirectIfLoggedIn('/');

    const form        = document.getElementById('login-form');
    const emailInput   = document.getElementById('email');
    const passInput    = document.getElementById('password');
    const emailError   = document.getElementById('email-error');
    const passError    = document.getElementById('password-error');
    const formError    = document.getElementById('form-error');
    const submitBtn    = document.getElementById('submit-btn');
    const togglePass   = document.getElementById('toggle-password');

    togglePass.addEventListener('click', () => {
        const isPwd = passInput.type === 'password';
        passInput.type = isPwd ? 'text' : 'password';
        togglePass.textContent = isPwd ? 'Hide' : 'Show';
    });

    function validEmail(v) { return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v); }

    function clearErrors() {
        [emailError, passError, formError].forEach(el => el.classList.remove('visible'));
        formError.textContent = '';
    }

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        clearErrors();

        let valid = true;
        if (!validEmail(emailInput.value.trim())) { emailError.classList.add('visible'); valid = false; }
        if (!passInput.value) { passError.classList.add('visible'); valid = false; }
        if (!valid) return;

        submitBtn.disabled = true;
        submitBtn.textContent = 'Signing in...';

        try {
            const res = await authApi.login(emailInput.value.trim(), passInput.value);
            auth.save(res.token, res.username);
            toast(`Welcome back, ${res.username}!`, 'success');

            const next = new URLSearchParams(location.search).get('next');
            location.href = next || '/';
        } catch (err) {
            formError.textContent = err.message || 'Invalid email or password';
            formError.classList.add('visible');
            submitBtn.disabled = false;
            submitBtn.textContent = 'Sign In';
        }
    });
</script>
</body>
</html>
